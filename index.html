<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电商运营数据看板</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen">

<div class="max-w-7xl mx-auto p-4">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-xl font-bold text-blue-600">电商销售运营看板</h1>
    <div class="space-x-2">
      <button class="px-3 py-1 bg-blue-500 text-white rounded">导出数据</button>
      <button class="px-3 py-1 border rounded">刷新</button>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
    <div class="bg-white p-4 rounded shadow">
      <p class="text-sm text-gray-500">总销售额</p>
      <h2 class="text-2xl font-bold">¥1,258,432</h2>
      <p class="text-green-500 text-sm">↑12.5% 较上月</p>
    </div>
    <div class="bg-white p-4 rounded shadow">
      <p class="text-sm text-gray-500">订单量</p>
      <h2 class="text-2xl font-bold">15,872</h2>
      <p class="text-green-500 text-sm">↑8.3% 较上月</p>
    </div>
    <div class="bg-white p-4 rounded shadow">
      <p class="text-sm text-gray-500">客单价</p>
      <h2 class="text-2xl font-bold">¥79.28</h2>
      <p class="text-green-500 text-sm">↑3.8% 较上月</p>
    </div>
    <div class="bg-white p-4 rounded shadow">
      <p class="text-sm text-gray-500">新增用户</p>
      <h2 class="text-2xl font-bold">3,245</h2>
      <p class="text-red-500 text-sm">↓2.1% 较上月</p>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
    <div class="bg-white p-4 rounded shadow h-80">
      <h3 class="mb-3 font-medium">销售趋势</h3>
      <canvas id="salesChart"></canvas>
    </div>
    <div class="bg-white p-4 rounded shadow h-80">
      <h3 class="mb-3 font-medium">品类销售占比</h3>
      <canvas id="cateChart"></canvas>
    </div>
  </div>
</div>

<script>
const salesCtx = document.getElementById('salesChart').getContext('2d');
new Chart(salesCtx, {
  type: 'line',
  data: {
    labels: ['1日','2日','3日','4日','5日','6日','7日'],
    datasets: [{
      label: '销售额',
      data: [42500,38900,41200,39800,44500,52300,56800],
      borderColor: '#3b82f6',
      backgroundColor: 'rgba(59,130,246,0.1)',
      tension: 0.4,
      fill: true
    }]
  },
  options: { maintainAspectRatio: false }
});

const cateCtx = document.getElementById('cateChart').getContext('2d');
new Chart(cateCtx, {
  type: 'doughnut',
  data: {
    labels: ['电子产品','服装','家居','美妆','其他'],
    datasets: [{
      data: [48,25,20,15,12],
      backgroundColor: ['#3b82f6','#10b981','#f59e0b','#ef4444','#64748b']
    }]
  },
  options: { maintainAspectRatio: false }
});
</script>
</body>
</html>
